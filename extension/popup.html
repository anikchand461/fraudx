<!doctype html>
<html>
  <head>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="scanline"></div>
    <div class="noise"></div>

    <div class="container">
      <div class="header">
        <div class="logo-wrap">
          <svg
            class="shield-icon"
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              d="M12 2L4 6V12C4 16.418 7.582 20.45 12 22C16.418 20.45 20 16.418 20 12V6L12 2Z"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linejoin="round"
            />
            <path
              d="M9 12L11 14L15 10"
              stroke="currentColor"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
          <h1>FRAUD<span>X</span></h1>
        </div>
        <p class="tagline">On-chain threat detection</p>
      </div>

      <div class="divider"></div>

      <div class="input-group">
        <label>WALLET ADDRESS</label>
        <div class="input-wrap">
          <span class="input-prefix">0x</span>
          <input
            id="wallet"
            placeholder="paste address..."
            autocomplete="off"
            spellcheck="false"
          />
        </div>
      </div>

      <button id="analyzeBtn">
        <span class="btn-text">ANALYZE</span>
        <span class="btn-icon">&#8594;</span>
        <div class="btn-glow"></div>
      </button>

      <div id="result" class="result hidden">
        <div class="result-label">RISK SCORE</div>
        <div class="result-score" id="scoreValue">--</div>
        <div class="result-bar-wrap">
          <div class="result-bar" id="scoreBar"></div>
        </div>
        <div class="result-status" id="statusText"></div>
      </div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
